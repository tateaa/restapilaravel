$kind: http-request
name: Login
method: POST
url: '{{base_url}}/api/login'
order: 1000
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "email": "admin@example.com",
      "password": "password"
    }
scripts:
  - type: afterResponse
    language: text/javascript
    code: |-
      const res = pm.response.json();
      if (res.token) {
          pm.environment.set('token', res.token);
      }
