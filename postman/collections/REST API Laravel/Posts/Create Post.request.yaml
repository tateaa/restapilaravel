$kind: http-request
name: Create Post
method: POST
url: '{{base_url}}/api/posts'
order: 3000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "My First Post",
      "status": "draft",
      "content": "This is the content of my first post."
    }
