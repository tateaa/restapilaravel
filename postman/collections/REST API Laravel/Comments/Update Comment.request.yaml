$kind: http-request
name: Update Comment
method: PATCH
url: '{{base_url}}/api/posts/{{post_id}}/comments/{{comment_id}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "comment": "Updated comment text."
    }
