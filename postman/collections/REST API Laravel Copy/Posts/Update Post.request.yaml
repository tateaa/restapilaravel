$kind: http-request
name: Update Post
method: PATCH
url: '{{base_url}}/api/posts/{{post_id}}'
order: 4000
auth:
  type: bearer
  credentials:
    - key: token
      value: '{{token}}'
headers:
  - key: Content-Type
    value: application/json
body:
  type: json
  content: |-
    {
      "title": "Updated Post Title",
      "status": "published",
      "content": "Updated content for the post."
    }
